documentationUrl: https://docs.airbyte.com/integrations/sources/3cx-xapi
connectionSpecification:
  $schema: http://json-schema.org/draft-07/schema#
  title: 3CX XAPI Source Spec
  type: object
  required:
    - fqdn
    - client_id
    - client_secret
    - start_date
  additionalProperties: true
  properties:
    fqdn:
      type: string
      title: 3CX Hostname
      description: >
        Fully-qualified domain name of the 3CX server, e.g. pbx.example.com.
        Do not include the https:// prefix.
      examples:
        - pbx.example.com
      order: 0
    client_id:
      type: string
      title: Client ID
      description: OAuth2 client ID from the 3CX XAPI application credentials.
      order: 1
    client_secret:
      type: string
      title: Client Secret
      description: OAuth2 client secret from the 3CX XAPI application credentials.
      airbyte_secret: true
      order: 2
    start_date:
      type: string
      title: Start Date
      description: >
        ISO 8601 date (YYYY-MM-DD). CallLogData will be fetched incrementally
        starting from this date on the first sync.
      pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
      examples:
        - "2026-01-01"
      order: 3
    lookback_months:
      type: integer
      title: Lookback Months
      description: >
        Number of months to re-fetch for queue aggregate streams
        (QueuePerformanceOverview and AgentsInQueueStatistics).
        These streams use full-refresh over a rolling window because the
        monthly aggregates update throughout the month.
        The Users stream ignores this — it fetches the full user list on
        every sync.
      default: 2
      minimum: 1
      maximum: 12
      order: 4
